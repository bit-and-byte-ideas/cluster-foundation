apiVersion: kind.x-k8s.io/v1alpha4
kind: Cluster
name: local-dev
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 9080
        protocol: TCP
      - containerPort: 443
        hostPort: 9443
        protocol: TCP
  - role: worker
networking:
  apiServerAddress: "127.0.0.1"
  # 6443 is taken by Docker Desktop's built-in Kubernetes — use 6444 instead
  apiServerPort: 6444

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Stamp all namespaced resources from install.yaml with namespace: argocd.
# The Namespace resource itself is cluster-scoped and is unaffected by this setting.
namespace: argocd
resources:
  - namespace.yaml
  # Upstream ArgoCD install manifest — vendored at v2.14.4.
  # Flux's kustomize-controller blocks remote bases, so this file is committed directly.
  # To upgrade: re-download from https://github.com/argoproj/argo-cd/releases and replace this file.
  - install.yaml
